<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Casera - Carnicería</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fdf2e9; 
            color: #2c3e50; 
            text-align: center; 
            padding: 40px; 
        }
        .container { 
            background-color: #ffffff; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            max-width: 600px; 
            margin: 0 auto; 
            border-top: 5px solid #d35400;
        }
        h1 { color: #c0392b; font-size: 2.5em; margin-bottom: 10px;}
        h2 { color: #e67e22; }
        .promo { 
            background-color: #fef9e7; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px dashed #f1c40f;
            font-size: 1.2em;
            margin: 20px 0;
        }
        .student-info { margin-top: 30px; font-weight: bold; }
        .footer { 
            margin-top: 20px; 
            font-size: 0.9em; 
            color: #7f8c8d; 
            background-color: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥩 La Casera</h1>
        
        <h2>Promoción del día</h2>
        <div class="promo">
            <p>Costilla de res a <strong>45 Bs.</strong> el kilo.</p>
            <p>¡Ideal para tu parrillada este fin de semana en Santa Cruz!</p>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <p class="student-info">Estudiante: Jose Manzaneda</p>
        <p class="footer">🚀 Deploy automatizado con GitHub Actions hacia Amazon S3</p>
    </div>
</body>
</html>
